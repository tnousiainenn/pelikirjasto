<!DOCTYPE html>
<html>

<head>
  <title>Uusi kuvaus</title>
</head>

<body>
  <h1>Uusi kuvaus</h1>
  <form action="/createpost" method="post">
    <p>
      Pelin nimi: <br />
      <input type="text" name="title" />
    </p>
    <p>
      Pelin luokittelu/genre: <br />
      <input type="text" name="genre" />
    </p>
    <p>
      Kuvaus: <br />
      <textarea name="description" rows="5" cols="45"></textarea>
    </p>
    <input type="submit" value="Lähetä kuvaus" />
  </form>
</body>

</html>
