<!DOCTYPE html>
<html>

<head>
  <title>Käyttäjä {{ user.username }}</title>
</head>

<body>
  <h1>Käyttäjä {{ user.username }}</h1>

  <p>
      Käyttäjä on kirjoittanut yhteensä {{ posts | count }} pelin kuvausta.
  </p>


  {% if posts %}
  <h2>Käyttäjän pelikuvaukset</h2>

  <ul>
    {% for post in posts %}
    <li><a href="/post/{{ post.id }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}

  <p>
  <a href="/">Takaisin etusivulle</a>
  </p>


</body>

</html>
