<!DOCTYPE html>
<html>

<head>
  <title>Muokkaa kuvausta</title>
</head>
<link rel="stylesheet" href="/static/main.css">

<body>
  <div class="header">
  <h1>Muokkaa kuvausta</h1>
  </div>
  <div class="content">
  <form action="/updatepost" method="post">
    <p>
      Pelin nimi: <br />
      <input type="text" name="title" value="{{ post.title }}" maxlength="80" required />
    </p>



    {% for class in all_classes %}
    <p>
        {{ class }}: <br />
        <select name="classes">
           <option value="">(valitse)</option>
        {% for option in all_classes[class] %}
           {% if classes[class] == option %}
              <option value="{{ class }}:{{ option }}" selected> {{ option }}</option>
           {% else %}
              <option value="{{ class }}:{{ option }}"> {{ option }}</option>
           {% endif %}
        {% endfor %}
        </select>
    </p>
    {% endfor %}



    <p>
      Kuvaus: <br />
      <textarea name="description" rows="5" cols="45" maxlength="1000" required >{{ post.description }}</textarea>
    </p>
    <input type="hidden" name="post_id" value="{{ post.id }}" />
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Päivitä kuvaus" />
  </form>
  </div>
</body>

</html>
