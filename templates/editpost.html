<!DOCTYPE html>
<html>

<head>
  <title>Muokkaa kuvausta</title>
</head>

<body>
  <h1>Muokkaa kuvausta</h1>
  <form action="/updatepost" method="post">
    <p>
      Pelin nimi: <br />
      <input type="text" name="title" value="{{ post.title }}" />
    </p>
    <p>
      Pelin luokittelu/genre: <br />
      <input type="text" name="genre" value="{{ post.genre }}" />
    </p>
    <p>
      Kuvaus: <br />
      <textarea name="description" rows="5" cols="45">{{ post.description }}</textarea>
    </p>
    <input type="hidden" name="post_id" value="{{ post.id }}" />
    <input type="submit" value="Päivitä kuvaus" />
  </form>
</body>

</html>
